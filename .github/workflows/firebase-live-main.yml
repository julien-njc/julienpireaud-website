name: Firebase Live Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-live-main
  cancel-in-progress: true

jobs:
  deploy_live:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Firebase service account file
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          CREDENTIALS_PATH="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Build site
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_ACCESS_KEY }}
        run: npm run build

      - name: Debug build and Firebase config
        run: |
          pwd
          ls -la
          echo "--- build ---"
          ls -la build
          echo "--- firebase.json ---"
          cat firebase.json

      - name: Deploy live site
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          npx firebase-tools deploy \
            --config firebase.json \
            --project "$FIREBASE_PROJECT_ID" \
            --only hosting

      - name: Write workflow summary
        run: |
          {
            echo "## Firebase live deploy completed"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Target: \`live\`"
          } >> "$GITHUB_STEP_SUMMARY"
