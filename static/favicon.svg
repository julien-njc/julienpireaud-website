<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title">
  <title>Julien Pireaud favicon</title>
  <defs>
    <linearGradient id="bg" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f8b8d" />
      <stop offset="100%" stop-color="#f3b562" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect x="24" y="24" width="208" height="208" rx="52" fill="url(#bg)" filter="url(#shadow)" />
  <text
    x="128"
    y="164"
    text-anchor="middle"
    font-family="Manrope, Avenir Next, Aptos, sans-serif"
    font-size="128"
    font-weight="700"
    letter-spacing="0"
    fill="#ffffff"
  >
    JP
  </text>
</svg>
